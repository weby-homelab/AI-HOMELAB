model_list:
  # Легка модель для швидких відповідей
  - model_name: gemma-3-4b
    litellm_params:
      model: ollama/gemma3:4b
      api_base: http://agent-ollama:11434
      timeout: 300

  # Модель середнього класу для складних логічних задач (Phi-4)
  - model_name: phi-4
    litellm_params:
      model: ollama/phi4:14b
      api_base: http://agent-ollama:11434
      timeout: 600

  # Резервний роут (приклад) для підключення хмарних API, якщо залізо перевантажене
  # - model_name: gemini-flash
  #   litellm_params:
  #     model: gemini/gemini-1.5-flash
  #     api_key: "os.environ/GEMINI_API_KEY"

litellm_settings:
  drop_params: true
  set_verbose: false
